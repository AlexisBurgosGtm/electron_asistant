<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Electron Asistant</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <div class="app-bg"></div>
  <div class="app-bg-glow app-bg-glow--1"></div>
  <div class="app-bg-glow app-bg-glow--2"></div>

  <div id="app" class="app">
    <aside class="sidebar glass">
      <div class="sidebar__brand">
        <i class="fa-solid fa-database"></i>
        <span>Electron Asistant</span>
      </div>
      <nav class="sidebar__nav" id="nav"></nav>
      <div class="voice-control glass">
        <button class="voice-btn" id="voice-toggle" type="button" title="Activar reconocimiento de voz">
          <i class="fa-solid fa-microphone"></i>
        </button>
        <div class="voice-status" id="voice-status">Voz inactiva</div>
      </div>
      <div class="sidebar__footer">
        <span class="status-dot"></span>
        <span id="server-status">Conectando...</span>
      </div>
    </aside>

    <main class="main">
      <header class="topbar glass">
        <h1 id="page-title">Inicio</h1>
        <div class="topbar__actions" id="topbar-actions"></div>
      </header>
      <section class="content" id="content"></section>
    </main>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <div id="modal-root"></div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
